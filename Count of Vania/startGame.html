<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Count of Vania</title>
  <link rel="stylesheet" href="websiteStyle/startGame.css">
</head>
<body>
  <!-- Audio -->
    <audio loop id="music">
      <source src="soundtrack/Start Menu.mp3" type="audio/mp3">
    </audio>

  <!-- Navigation -->
  <header>
    <nav class="navigation">
      <div class="logo-container">
        <img src="websiteStyle/images/Logo.png" alt="company logo">
        <h4>3Js</h4>
      </div>
      
      <div class="nav-options">
        <h4 onclick="displayLogin()">Login</h4>
        <h4 onclick="displayRegister()">Register</h4>
      </div>
    </nav>
  </header>

  <!-- Main Content Body -->
  <div class="center-game">
    <img src="icons/muteButton.png" alt="music button" id="musicButton" onclick="toggleAudio()">
    <h1 class="title">Count of Vania</h1>

    <div class="start-container">
      <h1 class="start"><a href="main.html">Start Game</a></h1> 
    </div>
  </div>

  <!-- Login -->
  <form action="" method="" id="login-center-form">
    <div class="form-container">
      <img src="icons/x.png" alt="x button" class="xIcon" onclick="eraseRegisterLogin()">
      <h1>Login</h1>
      <input type="text" name="" placeholder="Username"> <br>
      <input type="text" name="" placeholder="Password"> <br>

      <div id="loginbtn_registerbtn">Login</div>
    </div>
  </form>

  <!-- Register -->
  <form action="" method="" id="register-center-form">
    <div class="form-container">
      <img src="icons/x.png" alt="x button" class="xIcon" onclick="eraseRegisterLogin()">
      <h1>Register</h1>
      <input type="text" name="" placeholder="Email"> <br>
      <input type="text" name="" placeholder="Username"> <br>
      <input type="text" name="" placeholder="Password"> <br>
      <input type="text" name="" placeholder="Confirm Password"> <br>

      <div id="loginbtn_registerbtn">Register</div>
    </div>
  </form>

  <!-- js file -->
  <script src="overallGameMechanism.js"></script>
</body>
</html>
